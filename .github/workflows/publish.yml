name: Publish to npm

# Publishes whenever a push to main carries a packages/cli version that has
# no tag yet — then creates the matching v<version> tag. Bumping the version
# in package.json IS the release action; tags are derived, never hand-made.
on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the release tag
      id-token: write # npm provenance attestation

    steps:
      - uses: actions/checkout@v4

      - name: Check whether this version is already released
        id: version
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git ls-remote --tags origin "refs/tags/v$VERSION" | grep -q .; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "v$VERSION already tagged — nothing to publish"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "v$VERSION is new — releasing"
          fi

      - uses: actions/setup-node@v4
        if: steps.version.outputs.released == 'false'
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        # OIDC publish needs npm >= 11.5.1; Node 22 bundles npm 10.x
        if: steps.version.outputs.released == 'false'
        run: npm install -g npm@latest

      - name: Install dependencies
        if: steps.version.outputs.released == 'false'
        run: npm ci

      - name: Run tests
        if: steps.version.outputs.released == 'false'
        run: npm test --workspace packages/template

      - name: Publish
        # Authenticates via OIDC trusted publishing (configured on
        # npmjs.com for this repo + workflow) — no token secret needed.
        # prepack builds the CLI and syncs the template automatically.
        if: steps.version.outputs.released == 'false'
        run: npm publish --access public --provenance
        working-directory: packages/cli

      - name: Tag the release
        # Tag only after a successful publish, so a failed publish can be
        # retried by re-running the workflow — the tag is the "done" marker
        if: steps.version.outputs.released == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
