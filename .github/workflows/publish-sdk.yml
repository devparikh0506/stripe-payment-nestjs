name: Publish SDK to npm

# Publishes whenever a push to main carries a packages/sdk version that has
# no paykit-v<version> tag yet, then creates that tag. Mirrors publish.yml
# (the CLI release) but with an INDEPENDENT tag namespace (paykit-v*) so the
# SDK and CLI releases never collide. Bumping packages/sdk/package.json
# version IS the release action; the tag is derived, never hand-made.
on:
  push:
    branches: [main]

jobs:
  release-sdk:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the release tag
      id-token: write # npm provenance / OIDC trusted publishing

    steps:
      - uses: actions/checkout@v5

      - name: Check whether this SDK version is already released
        id: version
        run: |
          VERSION=$(node -p "require('./packages/sdk/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git ls-remote --tags origin "refs/tags/paykit-v$VERSION" | grep -q .; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "paykit-v$VERSION already tagged - nothing to publish"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "paykit-v$VERSION is new - releasing"
          fi

      - uses: actions/setup-node@v5
        if: steps.version.outputs.released == 'false'
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        # OIDC publish needs npm >= 11.5.1; Node 22 bundles npm 10.x
        if: steps.version.outputs.released == 'false'
        run: npm install -g npm@latest

      - name: Install dependencies
        if: steps.version.outputs.released == 'false'
        run: npm ci

      - name: Build the SDK
        if: steps.version.outputs.released == 'false'
        run: npm run build --workspace packages/sdk

      - name: Publish
        # Authenticates via OIDC trusted publishing (must be configured on
        # npmjs.com for @dev_parikh/paykit + this workflow) - no token secret.
        # --access public is required for scoped packages.
        if: steps.version.outputs.released == 'false'
        run: npm publish --access public --provenance
        working-directory: packages/sdk

      - name: Tag the release
        # Tag only after a successful publish, so a failed publish can be
        # retried by re-running the workflow - the tag is the "done" marker.
        if: steps.version.outputs.released == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "paykit-v${{ steps.version.outputs.version }}"
          git push origin "paykit-v${{ steps.version.outputs.version }}"
